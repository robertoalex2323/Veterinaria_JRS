<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/sildebar_admin::layout(~{::content}, 'mascotas')}">
<head>
    <title>Mascotas - Administrador</title>
</head>
<body>
<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="mb-0"><i class="fas fa-paw text-primary"></i> Mascotas</h2>
            <p class="text-muted mb-0">Listado de mascotas registradas</p>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-header py-3">
            <h6 class="m-0 font-weight-bold text-primary">Lista de Mascotas</h6>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Especie</th>
                            <th>Raza</th>
                            <th>Edad</th>
                            <th>Peso</th>
                            <th>Cliente</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="mascota : ${mascotas}">
                            <td th:text="${mascota.id}">1</td>
                            <td class="fw-bold" th:text="${mascota.nombre}">Mascota</td>
                            <td th:text="${mascota.especie}">Canino</td>
                            <td th:text="${mascota.raza != null ? mascota.raza : '-'}">-</td>
                            <td th:text="${mascota.edad != null ? mascota.edad : '-'}">-</td>
                            <td th:text="${mascota.peso != null ? mascota.peso + ' kg' : '-'}">-</td>
                            <td th:text="${mascota.cliente != null ? mascota.cliente.nombre : '-'}">-</td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(mascotas)}">
                            <td colspan="7" class="text-center text-muted py-4">No hay mascotas registradas.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
