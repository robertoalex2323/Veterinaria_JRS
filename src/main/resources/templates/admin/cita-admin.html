<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/sildebar_admin::layout(~{::content}, 'citas')}">
<head>
    <title>Citas - Administrador</title>
</head>
<body>
<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="mb-0"><i class="fas fa-calendar-check text-primary"></i> Citas</h2>
            <p class="text-muted mb-0">Listado de citas del sistema</p>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-header py-3">
            <h6 class="m-0 font-weight-bold text-primary">Lista de Citas</h6>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Fecha y Hora</th>
                            <th>Mascota</th>
                            <th>Cliente</th>
                            <th>Veterinario</th>
                            <th>Motivo</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="cita : ${citas}">
                            <td th:text="${cita.id}">1</td>
                            <td th:text="${cita.fechaHora != null ? #temporals.format(cita.fechaHora, 'dd/MM/yyyy HH:mm') : '-'}">-</td>
                            <td class="fw-bold" th:text="${cita.mascota != null ? cita.mascota.nombre : '-'}">-</td>
                            <td th:text="${cita.mascota != null && cita.mascota.cliente != null ? cita.mascota.cliente.nombre : '-'}">-</td>
                            <td th:text="${cita.veterinario != null ? cita.veterinario.nombre : '-'}">-</td>
                            <td th:text="${cita.motivo != null ? cita.motivo : '-'}">-</td>
                            <td><span class="badge bg-info" th:text="${cita.estado}">AGENDADA</span></td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(citas)}">
                            <td colspan="7" class="text-center text-muted py-4">No hay citas registradas.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
