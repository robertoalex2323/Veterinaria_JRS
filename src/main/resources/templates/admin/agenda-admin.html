<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/sildebar_admin::layout(~{::content}, 'agenda')}">
<head>
    <title>Agenda - Administrador</title>
</head>
<body>
<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="mb-0"><i class="fas fa-calendar-day text-primary"></i> Agenda</h2>
            <p class="text-muted mb-0">Listado de horarios de atencion</p>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-header py-3">
            <h6 class="m-0 font-weight-bold text-primary">Lista de Agenda</h6>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Fecha</th>
                            <th>Hora Inicio</th>
                            <th>Hora Fin</th>
                            <th>Duracion</th>
                            <th>Veterinario</th>
                            <th>Disponible</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="agenda : ${agendas}">
                            <td th:text="${agenda.id}">1</td>
                            <td th:text="${agenda.fecha != null ? #temporals.format(agenda.fecha, 'dd/MM/yyyy') : '-'}">-</td>
                            <td th:text="${agenda.horaInicio != null ? #temporals.format(agenda.horaInicio, 'HH:mm') : '-'}">-</td>
                            <td th:text="${agenda.horaFin != null ? #temporals.format(agenda.horaFin, 'HH:mm') : '-'}">-</td>
                            <td th:text="${agenda.duracionTurno != null ? agenda.duracionTurno + ' min' : '-'}">-</td>
                            <td th:text="${agenda.veterinario != null ? agenda.veterinario.nombre : '-'}">-</td>
                            <td>
                                <span class="badge" th:classappend="${agenda.disponible == true} ? 'bg-success' : 'bg-danger'"
                                      th:text="${agenda.disponible == true} ? 'Si' : 'No'">Si</span>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(agendas)}">
                            <td colspan="7" class="text-center text-muted py-4">No hay horarios registrados.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
