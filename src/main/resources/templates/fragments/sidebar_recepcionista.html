<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(content, currentPage)">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" th:href="@{/Imagen/Iconos/logo.png}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/global.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>

<body>
    <!-- LAYOUT PRINCIPAL -->
    <div class="container-fluid p-0">

        <!-- SIDEBAR INLINE -->
        <div class="sidebar">
            <div class="sidebar-logo">
                <img th:src="@{/Imagen/Iconos/logo.png}" alt="Logo Pet Clinic">
                <h3>Pet Clinic</h3>
                <p>Veterinaria</p>
            </div>

            <ul class="sidebar-nav">
                <li class="nav-item">
                    <a th:classappend="${currentPage == 'dashboard'} ? 'active' : ''" class="nav-link"
                        href="/recepcionista/dashboard">
                        <i class="fas fa-tachometer-alt"></i>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a th:classappend="${currentPage == 'clientes'} ? 'active' : ''" class="nav-link"
                        href="/recepcionista/clientes">
                        <i class="fas fa-users"></i>
                        <span>Clientes</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a th:classappend="${currentPage == 'mascotas'} ? 'active' : ''" class="nav-link"
                        href="/recepcionista/mascotas">
                        <i class="fas fa-paw"></i>
                        <span>Mascotas</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a th:classappend="${currentPage == 'citas'} ? 'active' : ''" class="nav-link"
                        href="/recepcionista/citas">
                        <i class="fas fa-calendar-alt"></i>
                        <span>Citas</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a th:classappend="${currentPage == 'agenda'} ? 'active' : ''" class="nav-link"
                        href="/recepcionista/agenda">
                        <i class="fas fa-calendar-day"></i>
                        <span>Agenda</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a th:classappend="${currentPage == 'pagos'} ? 'active' : ''" class="nav-link"
                        href="/recepcionista/pagos">
                        <i class="fas fa-money-bill-wave"></i>
                        <span>Pagos</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a th:classappend="${currentPage == 'ml'} ? 'active' : ''" class="nav-link"
                        href="/recepcionista/ml/diagnostico">
                        <i class="fas fa-robot"></i>
                        <span>Diagnóstico IA</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a th:classappend="${currentPage == 'perfil'} ? 'active' : ''" class="nav-link"
                        href="/recepcionista/perfil">
                        <i class="fas fa-user-circle"></i>
                        <span>Mi Perfil</span>
                    </a>
                </li>
            </ul>

            <div class="sidebar-user">
                <div class="user-name" style="font-size: 0.9em; word-wrap: break-word; white-space: normal;">
                    <i class="fas fa-user-circle"></i>
                    <!-- Mostrar el nombre del usuario real si desea -->
                    <span>Roberto Anton</span>
                </div>
                <div class="user-role text-muted" style="font-size: 0.8em;">Recepcionista</div>
                <a href="/logout" class="logout-link mt-2">
                    <i class="fas fa-sign-out-alt"></i> <span>Cerrar Sesión</span>
                </a>
            </div>
        </div>

        <div class="main-content">
            <!-- NAVBAR INLINE -->
            <div class="navbar-custom">
                <div class="d-flex justify-content-between align-items-center">
                    <h4 class="mb-0">
                        <i class="fas fa-clinic-medical"></i> Veterinaria Pet Clinic
                    </h4>
                    <div class="dropdown">
                        <button class="dropdown-toggle" data-bs-toggle="dropdown">
                            <i class="fas fa-user-circle"></i>
                            <span>Roberto Anton</span>
                        </button>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="/recepcionista/perfil"><i class="fas fa-user"></i> Mi
                                    Perfil</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item text-danger" href="/logout"><i class="fas fa-sign-out-alt"></i>
                                    Cerrar Sesión</a></li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="content-wrapper">
                <div th:if="${success}" class="alert alert-success alert-dismissible fade show">
                    <i class="fas fa-check-circle"></i>
                    <span th:text="${success}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${error}" class="alert alert-danger alert-dismissible fade show">
                    <i class="fas fa-exclamation-circle"></i>
                    <span th:text="${error}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                <div th:if="${info}" class="alert alert-info alert-dismissible fade show">
                    <i class="fas fa-info-circle"></i>
                    <span th:text="${info}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <div th:replace="${content}"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/global.js}"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            setTimeout(function () {
                document.querySelectorAll('.alert').forEach(function (alert) {
                    var bsAlert = new bootstrap.Alert(alert);
                    bsAlert.close();
                });
            }, 5000);
        });
    </script>
</body>

</html>
