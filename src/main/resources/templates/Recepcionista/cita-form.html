<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{fragments/sidebar_recepcionista::layout(~{::content}, 'citas')}">
<head>
    <title>Agendar Cita - Recepcionista</title>
</head>
<body>
<div th:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="mb-0"><i class="fas fa-calendar-plus text-primary"></i> Agendar Cita</h2>
            <p class="text-muted mb-0">Registre una nueva cita para un paciente</p>
        </div>
        <div>
            <a href="/recepcionista/citas" class="btn btn-secondary shadow-sm">
                <i class="fas fa-arrow-left fa-sm text-white-50"></i> Volver a la Agenda
            </a>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-xl-8 col-lg-10">
            <div class="citas-card bg-white h-100">
                <div class="citas-card-header bg-primary text-white border-0" style="border-radius: 12px 12px 0 0 !important;">
                    <h6 class="m-0 font-weight-bold"><i class="fas fa-edit me-2"></i> Detalles de la Cita</h6>
                </div>
                
                <div class="card-body p-4 p-md-5">
                    <form th:action="@{/recepcionista/citas/guardar}" method="post">
                        
                        <!-- Selección de Paciente -->
                        <div class="mb-4">
                            <label class="form-label fw-bold text-dark">Paciente (Mascota) <span class="text-danger">*</span></label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-paw"></i></span>
                                <select name="mascotaId" id="mascotaId" class="form-select" required>
                                    <option value="">Seleccione una mascota / dueño...</option>
                                    <option th:each="mascota : ${mascotas}" 
                                            th:value="${mascota.id}" 
                                            th:text="${mascota.nombre + ' (' + mascota.especie + ') - Dueño: ' + mascota.cliente?.nombre}">
                                    </option>
                                </select>
                            </div>
                            <div class="form-text"><i class="fas fa-info-circle"></i> Escriba para buscar por nombre de mascota o cliente si usa la búsqueda.</div>
                        </div>

                        <!-- Fecha y Hora -->
                        <div class="row gx-4 mb-4">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label class="form-label fw-bold text-dark">Fecha de la cita <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-calendar-alt"></i></span>
                                    <input type="date" name="fecha" class="form-control" required th:min="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold text-dark">Hora <span class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="far fa-clock"></i></span>
                                    <input type="time" name="hora" class="form-control" required>
                                </div>
                            </div>
                        </div>

                        <!-- Motivo -->
                        <div class="mb-4">
                            <label class="form-label fw-bold text-dark">Motivo de la Consulta <span class="text-danger">*</span></label>
                            <textarea name="motivo" class="form-control" rows="3" required placeholder="Ej. Vacunación, control general, dolor de estómago..."></textarea>
                        </div>
                        
                        <hr class="my-4">
                        
                        <!-- Botones -->
                        <div class="d-flex justify-content-end gap-3">
                            <a href="/recepcionista/citas" class="btn btn-light border btn-lg px-4">Cancelar</a>
                            <button type="submit" class="btn btn-primary btn-lg px-4">
                                <i class="fas fa-calendar-check me-2"></i> Agendar Cita
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <script th:src="@{/js/citas.js}"></script>
</div>
</body>
</html>
