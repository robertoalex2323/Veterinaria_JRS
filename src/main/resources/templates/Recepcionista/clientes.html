<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/sidebar_recepcionista::layout(~{::content}, 'clientes')}">

<head>
    <title>Gestión de Clientes - Recepcionista</title>
    <link rel="stylesheet" th:href="@{/css/clientes.css}">
</head>

<body>
    <div th:fragment="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="mb-0"><i class="fas fa-users text-primary"></i> Clientes</h2>
                <p class="text-muted mb-0">Gestión de clientes de la veterinaria</p>
            </div>
            <div>
                <a href="/recepcionista/clientes/nuevo" class="btn btn-primary shadow-sm">
                    <i class="fas fa-plus fa-sm text-white-50"></i> Nuevo Cliente
                </a>
            </div>
        </div>

        <!-- Mensajes de alerta -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fas fa-check-circle me-1"></i> <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-circle me-1"></i> <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="card mb-4">
            <div class="card-header py-3 d-flex justify-content-between align-items-center">
                <h6 class="m-0 font-weight-bold text-primary">Lista de Clientes</h6>
                <form class="d-flex" th:action="@{/recepcionista/clientes}" method="get">
                    <div class="input-group">
                        <input type="text" class="form-control bg-light border-0 small"
                            placeholder="Buscar por nombre..." aria-label="Search" name="buscar" th:value="${buscar}">
                        <button class="btn btn-primary" type="submit">
                            <i class="fas fa-search fa-sm"></i>
                        </button>
                        <a th:if="${buscar != null and !buscar.empty}" th:href="@{/recepcionista/clientes}"
                            class="btn btn-secondary">
                            <i class="fas fa-times"></i>
                        </a>
                    </div>
                </form>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Nombre</th>
                                <th>Teléfono</th>
                                <th>Email</th>
                                <th>Fecha Registro</th>
                                <th class="text-center">Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="cliente : ${clientes}">
                                <td th:text="${cliente.id}">1</td>
                                <td class="fw-bold text-dark" th:text="${cliente.nombre}">Juan Perez</td>
                                <td th:text="${cliente.telefono}">987654321</td>
                                <td th:text="${cliente.email != null ? cliente.email : '-'}">juan@gmail.com</td>
                                <td th:text="${#temporals.format(cliente.fechaRegistro, 'dd/MM/yyyy')}">01/01/2026</td>
                                <td class="text-center">
                                    <a th:href="@{/recepcionista/clientes/ver/{id}(id=${cliente.id})}"
                                        class="btn btn-info btn-sm text-white" title="Ver Detalles">
                                        <i class="fas fa-eye"></i>
                                    </a>
                                    <a th:href="@{/recepcionista/clientes/editar/{id}(id=${cliente.id})}"
                                        class="btn btn-warning btn-sm text-white" title="Editar">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <a href="javascript:void(0)" class="btn btn-danger btn-sm" title="Eliminar"
                                        th:onclick="'confirmarEliminacion(' + ${cliente.id} + ')'">
                                        <i class="fas fa-trash"></i>
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${clientes.empty}">
                                <td colspan="6" class="text-center py-4 text-muted">
                                    <i class="fas fa-users-slash fa-3x mb-3 d-block opacity-50"></i>
                                    No se encontraron clientes registrados.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <script>
            function confirmarEliminacion(id) {
                if (confirm('¿Está seguro de eliminar este cliente? Esta acción no se puede deshacer.')) {
                    window.location.href = '/recepcionista/clientes/eliminar/' + id;
                }
            }
        </script>
    </div>
</body>

</html>
