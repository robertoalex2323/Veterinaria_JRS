<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{fragments/sidebar_recepcionista::layout(~{::div#content}, 'pagos')}">

<head>
    <title>Registrar Pago - Recepcionista</title>
</head>

<body>
    <div id="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="mb-0"><i class="fas fa-cash-register text-success"></i> Registrar Pago</h2>
                <p class="text-muted mb-0">Emisión de nuevo recibo de pago</p>
            </div>
            <div>
                <a href="/recepcionista/pagos" class="btn btn-secondary shadow-sm">
                    <i class="fas fa-arrow-left fa-sm text-white-50"></i> Volver a Pagos
                </a>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-xl-8 col-lg-10">
                <div class="pagos-card h-100">
                    <div class="pagos-header border-0">
                        <h6 class="m-0 font-weight-bold"><i class="fas fa-file-invoice me-2"></i> Detalles de
                            Facturación</h6>
                    </div>

                    <div class="card-body p-4 p-md-5">
                        <form id="pagoForm" th:action="@{/recepcionista/pagos/guardar}" method="post">

                            <div class="receipt-container mb-4">
                                <!-- Monto Principal -->
                                <div class="mb-3 text-center">
                                    <label class="form-label fw-bold text-success text-uppercase mb-2">Importe a Cobrar
                                        <span class="text-danger">*</span></label>
                                    <div class="input-group input-monto-group mx-auto" style="max-width: 300px;">
                                        <span class="input-group-text">S/</span>
                                        <input type="number" name="monto" id="monto"
                                            class="form-control form-control-lg text-center" step="0.01" min="0.10"
                                            placeholder="0.00" required>
                                    </div>
                                </div>
                            </div>

                            <!-- Cliente -->
                            <div class="mb-4">
                                <label class="form-label fw-bold text-dark">Cliente <span
                                        class="text-danger">*</span></label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="fas fa-user"></i></span>
                                    <select name="clienteId" id="clienteId" class="form-select" required>
                                        <option value="">Seleccione un cliente...</option>
                                        <option th:each="cliente : ${clientes}" th:value="${cliente.id}"
                                            th:text="${cliente.nombre + ' - DNI/Tel: ' + (cliente.telefono != null ? cliente.telefono : 'N/A')}">
                                        </option>
                                    </select>
                                </div>
                            </div>

                            <!-- Método de Pago y Referencia Cita -->
                            <div class="row gx-4 mb-4">
                                <div class="col-md-6 mb-3 mb-md-0">
                                    <label class="form-label fw-bold text-dark">Método de Pago <span
                                            class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i
                                                class="fas fa-credit-card"></i></span>
                                        <select name="metodoPago" id="metodoPago" class="form-select" required>
                                            <option value="Efectivo">💵 Efectivo</option>
                                            <option value="Tarjeta">💳 Tarjeta (Crédito/Débito)</option>
                                            <option value="Yape/Plin">📱 Yape / Plin</option>
                                            <option value="Transferencia">🏦 Transferencia Bancaria</option>
                                        </select>
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <label class="form-label fw-bold text-dark">ID Cita Referencia <span
                                            class="text-muted fw-normal">(Opcional)</span></label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light"><i class="fas fa-hashtag"></i></span>
                                        <input type="number" name="citaId" class="form-control" placeholder="Ej. 12"
                                            min="1">
                                    </div>
                                    <div class="form-text">Vincular este pago a una cita existente.</div>
                                </div>
                            </div>

                            <!-- Dynamic Payment Fields -->
                            <div id="dynamicPaymentFields" class="mb-4">
                                <!-- Tarjeta -->
                                <div id="tarjetaFields" class="payment-method-fields d-none">
                                    <label class="form-label fw-bold text-dark">Número de Tarjeta <span
                                            class="text-danger">*</span></label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light" id="cardIcon"><i
                                                class="fas fa-credit-card"></i></span>
                                        <input type="text" id="numeroTarjeta" class="form-control"
                                            placeholder="0000 0000 0000 0000" maxlength="19">
                                    </div>
                                    <div class="form-text">Visa, Mastercard, Amex, etc. detectado automáticamente.</div>
                                </div>

                                <!-- Transferencia -->
                                <div id="transferenciaFields" class="payment-method-fields d-none">
                                    <label class="form-label fw-bold text-dark">Voucher de Transferencia <span
                                            class="text-danger">*</span></label>
                                    <input type="file" id="comprobante" class="form-control" accept="image/*">
                                </div>

                                <!-- Yape / Plin -->
                                <div id="yapeFields" class="payment-method-fields d-none text-center">
                                    <label class="form-label fw-bold text-dark mb-3">Escanea el código QR para pagar
                                        <span class="text-danger">*</span></label>
                                    <div class="qr-container mx-auto mb-3">
                                        <img th:src="@{/Imagen/Iconos/qr-yape.png}" alt="QR Yape/Plin"
                                            class="img-fluid rounded border shadow-sm" style="max-width: 200px;">
                                    </div>
                                    <div class="form-text text-muted mb-2">Una vez escaneado y pagado, haz clic en
                                        procesar pago.</div>
                                </div>
                            </div>

                            <hr class="my-4">

                            <!-- Botones -->
                            <div class="d-flex justify-content-end gap-3">
                                <a href="/recepcionista/pagos" class="btn btn-light border btn-lg px-4">Cancelar</a>
                                <button type="submit" class="btn btn-success btn-lg px-4">
                                    <i class="fas fa-check-circle me-2"></i> Procesar Pago
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <script th:src="@{/js/pagos.js}"></script>
    </div>
</body>

</html>
